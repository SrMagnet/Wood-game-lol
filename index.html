<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>The Wood Game lol</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body { margin:0; background:#1e1e1e; color:white; text-align:center; font-family:Arial;}
canvas { background:#2e2e2e; display:block; margin:20px auto; border:2px solid white;}

.barra-container { width:300px; height:20px; background:#555; margin:10px auto; border-radius:10px; overflow:hidden;}
#barraHacha { height:100%; width:0%; background:#4CAF50;}

#menuLogros {
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:20px;
  border:2px solid white;
  max-height:300px;
  overflow:auto;
}

#discordBox {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: #2b2b2b;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #555;
}

button { margin:5px; padding:5px 10px; cursor:pointer;}
</style>
</head>

<body>

<h1>🌳 The Wood Game lol</h1>

<!-- 🌍 IDIOMA -->
<button onclick="cambiarIdioma('es')">🇪🇸</button>
<button onclick="cambiarIdioma('en')">🇺🇸</button>

<canvas id="game" width="600" height="400"></canvas>

<p>
<span id="txtMadera">Madera</span>: <span id="madera">0</span> |
<span id="txtHacha">Hacha</span>: <span id="hacha">1</span>
</p>

<p>
<span id="txtRebirth">Rebirths</span>: <span id="rebirths">0</span> |
<span id="txtMulti">Multiplicador</span>: <span id="multi">1</span>x
</p>

<div class="barra-container">
  <div id="barraHacha"></div>
</div>

<p id="mensajeMejora"></p>

<button onclick="toggleLogros()">🏆 <span id="txtLogros">Logros</span></button>

<div id="menuLogros">
  <h2>🏆 <span id="tituloLogros">Logros</span></h2>
  <ul id="listaLogros"></ul>
  <button onclick="toggleLogros()">Cerrar</button>
</div>

<!-- YT -->
<input id="ytlink" placeholder="YouTube link">
<button onclick="cargarYT()">Play</button>
<button onclick="togglePlay()">Pause</button>
<br>
<input type="range" id="volumen" min="0" max="100">

<div id="ytplayer"></div>

<!-- DISCORD -->
<div id="discordBox">
  <p>🚀 Discord 👇</p>
  <a href="https://discord.gg/9NbE3HWt" target="_blank">Entrar</a>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🌍 IDIOMAS
let idioma = "es";

const textos = {
  es: {
    madera: "Madera",
    hacha: "Hacha",
    rebirth: "Rebirths",
    multi: "Multiplicador",
    logros: "Logros",
    primera: "La primera vez",
    mejora: "Presiona Q para mejorar"
  },
  en: {
    madera: "Wood",
    hacha: "Axe",
    rebirth: "Rebirths",
    multi: "Multiplier",
    logros: "Achievements",
    primera: "First time",
    mejora: "Press Q to upgrade"
  }
};

function cambiarIdioma(id){
  idioma=id;
  actualizarUI();
}

// VARIABLES
let madera=0,hachaNivel=1,rebirths=0,multiplicador=1;
let arbolesTalados=0;

let jugador={x:100,y:100,size:20,speed:3};
let arboles=[{x:200,y:200},{x:300,y:150},{x:400,y:250}];

// LOGROS
let metas=[1,10,100,1000,10000,100000,1000000];
let logros={primera:false,milestones:{}};

// INPUT
let keys={};
document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.code==="Space"){e.preventDefault();talar();}
if(e.key==="e") plantar();
if(e.key==="q") mejorar();
if(e.key==="r") rebirth();
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// MOVIMIENTO
function mover(){
if(keys["w"])jugador.y-=jugador.speed;
if(keys["s"])jugador.y+=jugador.speed;
if(keys["a"])jugador.x-=jugador.speed;
if(keys["d"])jugador.x+=jugador.speed;

jugador.x=Math.max(0,Math.min(canvas.width-jugador.size,jugador.x));
jugador.y=Math.max(0,Math.min(canvas.height-jugador.size,jugador.y));
}

function cerca(a,b){return Math.abs(a.x-b.x)<25 && Math.abs(a.y-b.y)<25;}

// TALAR
let cd=0;
function talar(){
let now=Date.now();
if(now-cd<200)return;
cd=now;

arboles.forEach(a=>{
if(cerca(jugador,a)){
madera+=hachaNivel*multiplicador;
arbolesTalados++;

a.x=Math.random()*580;
a.y=Math.random()*380;
}
});

actualizarUI();
}

// PLANTAR
function plantar(){
if(madera<10)return;
arboles.push({x:jugador.x+20,y:jugador.y});
madera-=10;
actualizarUI();
}

// MEJORAR
function mejorar(){
let costo=Math.floor(20*Math.pow(1.5,hachaNivel));
if(madera>=costo){
madera-=costo;
hachaNivel++;
actualizarUI();
}
}

// REBIRTH
function rebirth(){
if(madera<1000)return;
rebirths++;
multiplicador+=0.5;
madera=0;
hachaNivel=1;
actualizarUI();
}

// LOGROS
function revisarLogros(){

if(!logros.primera && arbolesTalados>=1){
logros.primera=true;
alert("🏆 "+textos[idioma].primera);
}

metas.forEach(m=>{
if(arbolesTalados>=m && !logros.milestones[m]){
logros.milestones[m]=true;
alert("🏆 "+m+" árboles!");
}
});
}

// UI
function actualizarUI(){
document.getElementById("madera").textContent=madera;
document.getElementById("hacha").textContent=hachaNivel;
document.getElementById("rebirths").textContent=rebirths;
document.getElementById("multi").textContent=multiplicador;

// TEXTOS
document.getElementById("txtMadera").textContent=textos[idioma].madera;
document.getElementById("txtHacha").textContent=textos[idioma].hacha;
document.getElementById("txtRebirth").textContent=textos[idioma].rebirth;
document.getElementById("txtMulti").textContent=textos[idioma].multi;
document.getElementById("txtLogros").textContent=textos[idioma].logros;
document.getElementById("tituloLogros").textContent=textos[idioma].logros;

let costo=Math.floor(20*Math.pow(1.5,hachaNivel));
document.getElementById("barraHacha").style.width=(madera/costo*100)+"%";

document.getElementById("mensajeMejora").textContent=
madera>=costo?textos[idioma].mejora:"";

revisarLogros();
}

// MENU LOGROS
function toggleLogros(){
let menu=document.getElementById("menuLogros");
menu.style.display=menu.style.display==="none"?"block":"none";

let html=`<li>${logros.primera?"✅":"❌"} ${textos[idioma].primera}</li>`;

metas.forEach(m=>{
html+=`<li>${logros.milestones[m]?"✅":"❌"} ${m}</li>`;
});

document.getElementById("listaLogros").innerHTML=html;
}

// YOUTUBE
let player,isPlaying=false;
function onYouTubeIframeAPIReady(){
player=new YT.Player("ytplayer",{height:"0",width:"0"});
}
function cargarYT(){
let link=document.getElementById("ytlink").value;
let id=link.split("v=")[1];
if(id.includes("&"))id=id.split("&")[0];
player.loadVideoById(id);
player.playVideo();
isPlaying=true;
}
function togglePlay(){
if(!player)return;
isPlaying?player.pauseVideo():player.playVideo();
isPlaying=!isPlaying;
}
document.getElementById("volumen").addEventListener("input",()=>{
let v=document.getElementById("volumen").value;
if(player)player.setVolume(v);
});

// DRAW
function draw(){
ctx.clearRect(0,0,600,400);

ctx.fillStyle="blue";
ctx.fillRect(jugador.x,jugador.y,20,20);

ctx.fillStyle="green";
arboles.forEach(a=>ctx.fillRect(a.x,a.y,20,20));
}

// LOOP
function loop(){
mover();
draw();
requestAnimationFrame(loop);
}

loop();
actualizarUI();
</script>

</body>
</html>
