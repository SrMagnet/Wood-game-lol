<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>The Wood Game lol</title>

  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: #2e2e2e;
      display: block;
      margin: 20px auto;
      border: 2px solid white;
    }

    .barra-container {
      width: 300px;
      height: 20px;
      background: #555;
      margin: 10px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #barraHacha {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: width 0.2s;
    }

    #mensajeMejora {
      color: yellow;
      font-weight: bold;
      height: 20px;
    }

    #levelUpText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 50px;
      font-weight: bold;
      color: gold;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    button {
      margin: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    /* 🔥 DISCORD BOX */
    #discordBox {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #2b2b2b;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #555;
      font-size: 14px;
      animation: glow 1s infinite alternate;
    }

    #discordBox a {
      color: #00bfff;
      text-decoration: none;
    }

    #discordBox a:hover {
      text-decoration: underline;
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px #00bfff; }
      to { box-shadow: 0 0 15px #00bfff; }
    }
  </style>
</head>
<body>

<h1>🌳 The Wood Game lol</h1>
<p>WASD | ESPACIO talar | E plantar | Q mejorar | R rebirth</p>

<canvas id="game" width="600" height="400"></canvas>

<p>
🪵 Madera: <span id="madera">0</span> |
🪓 Hacha: <span id="hacha">1</span>
</p>

<p>
🔁 Rebirths: <span id="rebirths">0</span> |
⚡ Multiplicador: <span id="multi">1</span>x
</p>

<div class="barra-container">
  <div id="barraHacha"></div>
</div>

<p>Progreso: <span id="progresoTexto"></span></p>
<p id="mensajeMejora"></p>

<div id="levelUpText">LEVEL UP!</div>

<!-- 🎵 YOUTUBE -->
<input id="ytlink" placeholder="Link YouTube">
<button onclick="cargarYT()">Play</button>
<button onclick="togglePlay()">Pause/Play</button>

<p>🔊 Volumen</p>
<input type="range" id="volumen" min="0" max="100">

<div id="ytplayer"></div>

<audio id="levelSound" src="https://www.myinstants.com/media/sounds/pop.mp3"></audio>

<!-- 🚀 DISCORD -->
<div id="discordBox">
  <p>🚀 Entra al servidor de Discord 👇</p>
  <a href="https://discord.gg/9NbE3HWt" target="_blank">
    https://discord.gg/9NbE3HWt
  </a>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let madera = 0;
let hachaNivel = 1;
let rebirths = 0;
let multiplicador = 1;

let jugador = { x: 100, y: 100, size: 20, speed: 3 };

let arboles = [
  { x: 200, y: 200 },
  { x: 300, y: 150 },
  { x: 400, y: 250 }
];

// SAVE
function cargar() {
  const save = JSON.parse(localStorage.getItem("woodGameSave"));
  if (save) {
    madera = save.madera || 0;
    hachaNivel = save.hachaNivel || 1;
    arboles = save.arboles || arboles;
    rebirths = save.rebirths || 0;
    multiplicador = save.multiplicador || 1;
  }

  const vol = localStorage.getItem("volumen");
  document.getElementById("volumen").value = vol ? vol : 50;
}

function guardar() {
  localStorage.setItem("woodGameSave", JSON.stringify({
    madera, hachaNivel, arboles, rebirths, multiplicador
  }));
}

// INPUT
let keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;

  if (e.code === "Space") {
    e.preventDefault();
    talar();
  }

  if (e.key === "e") plantar();
  if (e.key === "q") mejorarHacha();
  if (e.key === "r") rebirth();
});

document.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

// MOVIMIENTO
function mover() {
  if (keys["w"]) jugador.y -= jugador.speed;
  if (keys["s"]) jugador.y += jugador.speed;
  if (keys["a"]) jugador.x -= jugador.speed;
  if (keys["d"]) jugador.x += jugador.speed;

  jugador.x = Math.max(0, Math.min(canvas.width - jugador.size, jugador.x));
  jugador.y = Math.max(0, Math.min(canvas.height - jugador.size, jugador.y));
}

// DISTANCIA
function estaCerca(a, b) {
  return Math.abs(a.x - b.x) < 25 && Math.abs(a.y - b.y) < 25;
}

// TALAR
let ultimoGolpe = 0;

function talar() {
  let cooldown = Math.max(100, 300 - hachaNivel * 20);
  let ahora = Date.now();
  if (ahora - ultimoGolpe < cooldown) return;
  ultimoGolpe = ahora;

  arboles.forEach(arbol => {
    if (estaCerca(jugador, arbol)) {
      madera += hachaNivel * multiplicador;
      arbol.x = Math.random() * (canvas.width - 20);
      arbol.y = Math.random() * (canvas.height - 20);
    }
  });

  actualizarUI();
}

// PLANTAR
function plantar() {
  if (madera < 10) return;

  let nuevo = { x: jugador.x + 25, y: jugador.y };

  let ocupado = arboles.some(a =>
    Math.abs(a.x - nuevo.x) < 20 &&
    Math.abs(a.y - nuevo.y) < 20
  );

  if (!ocupado) {
    arboles.push(nuevo);
    madera -= 10;
    actualizarUI();
  }
}

// MEJORAR
function mejorarHacha() {
  let costo = Math.floor(20 * Math.pow(1.5, hachaNivel));

  if (madera >= costo) {
    madera -= costo;
    hachaNivel++;

    document.getElementById("levelSound").play();

    let t = document.getElementById("levelUpText");
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 600);

    actualizarUI();
  }
}

// REBIRTH
function rebirth() {
  let req = 1000 * (rebirths + 1);
  if (madera < req) return;

  rebirths++;
  multiplicador += 0.5;

  madera = 0;
  hachaNivel = 1;

  arboles = [
    { x: 200, y: 200 },
    { x: 300, y: 150 }
  ];

  actualizarUI();
}

// UI
function actualizarUI() {
  document.getElementById("madera").textContent = Math.floor(madera);
  document.getElementById("hacha").textContent = hachaNivel;
  document.getElementById("rebirths").textContent = rebirths;
  document.getElementById("multi").textContent = multiplicador.toFixed(1);

  let costo = Math.floor(20 * Math.pow(1.5, hachaNivel));
  let progreso = Math.min(madera / costo, 1);

  document.getElementById("barraHacha").style.width = (progreso * 100) + "%";
  document.getElementById("progresoTexto").textContent = Math.floor(madera) + " / " + costo;
  document.getElementById("mensajeMejora").textContent =
    madera >= costo ? "⚡ Presiona Q para mejorar!!" : "";
}

// YOUTUBE API
let player;
let isPlaying = false;

function onYouTubeIframeAPIReady() {
  player = new YT.Player("ytplayer", {
    height: "0",
    width: "0",
    videoId: "",
    events: {
      onReady: () => {
        let vol = document.getElementById("volumen").value;
        player.setVolume(vol);
      }
    }
  });
}

function cargarYT() {
  let link = document.getElementById("ytlink").value;
  let id = link.split("v=")[1];
  if (id.includes("&")) id = id.split("&")[0];

  player.loadVideoById(id);
  player.playVideo();
  isPlaying = true;
}

function togglePlay() {
  if (!player) return;

  if (isPlaying) player.pauseVideo();
  else player.playVideo();

  isPlaying = !isPlaying;
}

// VOLUMEN
document.getElementById("volumen").addEventListener("input", () => {
  let vol = document.getElementById("volumen").value;
  if (player) player.setVolume(vol);
  localStorage.setItem("volumen", vol);
});

// DRAW
function dibujar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "blue";
  ctx.fillRect(jugador.x, jugador.y, jugador.size, jugador.size);

  ctx.fillStyle = "green";
  arboles.forEach(a => ctx.fillRect(a.x, a.y, 20, 20));
}

// LOOP
function loop() {
  mover();
  dibujar();
  requestAnimationFrame(loop);
}

// START
cargar();
loop();
actualizarUI();

setInterval(guardar, 2000);
window.addEventListener("beforeunload", guardar);
</script>

</body>
</html>
